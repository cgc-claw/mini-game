name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        type: string

env:
  GO_VERSION: '1.26'
  EBITEN_VERSION: 'v2.9.8'

jobs:
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Generate go.sum
        run: |
          go get github.com/hajimehoshi/ebiten/v2@${{ env.EBITEN_VERSION }}
          go get golang.org/x/image/font/basicfont@latest
          go mod tidy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Linux and Windows
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mini-game:latest
          outputs: type=local,dest=./dist

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename Linux artifact
        run: |
          mv dist/game-linux game-linux-${{ steps.version.outputs.version }}

      - name: Rename Windows artifact
        run: |
          mv dist/game-windows.exe game-windows-${{ steps.version.outputs.version }}.exe

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-linux-${{ steps.version.outputs.version }}
          path: game-linux-*
          retention-days: 5

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-windows-${{ steps.version.outputs.version }}
          path: game-windows-*
          retention-days: 5

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        run: |
          brew install glfw

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Ebiten module
        run: |
          go get github.com/hajimehoshi/ebiten/v2@${{ env.EBITEN_VERSION }}
          go get golang.org/x/image/font/basicfont@latest
          go mod tidy

      - name: Build
        env:
          CGO_ENABLED: 1
        run: |
          go build -o game-darwin .

      - name: Rename artifact
        run: |
          mv game-darwin game-darwin-arm64-${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-darwin-arm64-${{ steps.version.outputs.version }}
          path: game-darwin-arm64-*
          retention-days: 5

  release:
    needs: [build-docker, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: game-*

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: List artifacts
        run: |
          find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/game-linux-x64*
            artifacts/game-windows-x64*
            artifacts/game-darwin-arm64*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
